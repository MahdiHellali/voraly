# Apache worker caps for Matomo on a small single-core OVH VPS.
# Mounted read-only into the matomo container at /etc/apache2/conf-enabled/limits.conf
# (see docker-compose.yml). Prevents Apache prefork from spawning many workers
# and competing for RAM with web / n8n / MariaDB (scalability review).
<IfModule mpm_prefork_module>
    StartServers 2
    MinSpareServers 2
    MaxSpareServers 4
    MaxRequestWorkers 20
    MaxConnectionsPerChild 200
</IfModule>
