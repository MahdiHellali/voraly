# Voraly production stack for a single small OVH VPS (2 vCore / 4 GB RAM).
#
# SECURITY NOTE: the `web` and `n8n` services intentionally have NO host port
# mapping ("expose" only). They are reachable solely from inside the Docker
# network. Caddy is the single public entrypoint (80/443) and reverse-proxies
# to them by service name, so the Next.js app and the n8n editor are never
# exposed directly to the internet.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # SITE_DOMAIN / N8N_DOMAIN are read from .env.production and injected into
    # the Caddyfile via {$VAR} placeholders.
    env_file: ./.env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - voraly

  web:
    build:
      context: ../voraly-web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* must be passed as build args so Next can inline them.
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_WHOP_PLAN_ID: ${NEXT_PUBLIC_WHOP_PLAN_ID}
        NEXT_PUBLIC_WHOP_COMPANY_ID: ${NEXT_PUBLIC_WHOP_COMPANY_ID}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped
    env_file: ./.env.production
    expose:
      - "3000"
    mem_limit: 512m
    networks:
      - voraly

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    env_file: ./.env.production
    environment:
      N8N_HOST: ${N8N_DOMAIN}
      N8N_PROTOCOL: https
      N8N_PORT: 5678
      WEBHOOK_URL: https://${N8N_DOMAIN}/
      N8N_EDITOR_BASE_URL: https://${N8N_DOMAIN}/
      GENERIC_TIMEZONE: Africa/Tunis
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "336"
    volumes:
      - n8n_data:/home/node/.n8n
    expose:
      - "5678"
    mem_limit: 512m
    networks:
      - voraly

  # Matomo analytics (self-hosted). Reachable only on the internal `voraly`
  # network; Caddy is the single public entrypoint and proxies stats.voraly.net
  # to matomo:80. No host port mapping, like web/n8n.
  matomo-db:
    image: mariadb:11
    restart: unless-stopped
    # Tuned for a small 4 GB VPS: cap InnoDB pool + connections so MariaDB does
    # not balloon and trigger the OOM killer on web/n8n (scalability review).
    command: >
      --max-allowed-packet=64MB
      --innodb-buffer-pool-size=128M
      --innodb-log-file-size=32M
      --max-connections=50
      --tmp-table-size=32M
      --max-heap-table-size=32M
      --query-cache-type=0
    env_file: ./.env.production
    environment:
      MARIADB_DATABASE: matomo
      MARIADB_USER: matomo
      MARIADB_PASSWORD: ${MATOMO_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MATOMO_DB_ROOT_PASSWORD}
    volumes:
      - matomo_db:/var/lib/mysql
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voraly

  matomo:
    image: matomo:5-apache
    restart: unless-stopped
    env_file: ./.env.production
    environment:
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DB_PASSWORD}
      MATOMO_DATABASE_DBNAME: matomo
    volumes:
      - matomo_data:/var/www/html
      # Cap Apache workers for a single-core VPS (scalability review).
      - ./matomo-apache-limits.conf:/etc/apache2/conf-enabled/limits.conf:ro
    expose:
      - "80"
    mem_limit: 384m
    depends_on:
      matomo-db:
        condition: service_healthy
    networks:
      - voraly

  # Portainer — web GUI to manage/monitor the Docker stack (containers, logs,
  # stats, restarts). SECURITY: bound to the VPS loopback ONLY (127.0.0.1:9000),
  # never exposed to the internet. Access via SSH tunnel:
  #   ssh -i ~/.ssh/voraly_vps -L 9000:localhost:9000 ubuntu@152.228.128.234
  # then browse http://localhost:9000. (Docker socket = root-equivalent, so it
  # must not be publicly reachable.)
  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "127.0.0.1:9000:9000"

networks:
  voraly:

volumes:
  caddy_data:
  caddy_config:
  n8n_data:
  portainer_data:
  matomo_db:
  matomo_data:
